apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-app
  namespace: demo-apps
  labels:
    app: nginx-app
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-app
  template:
    metadata:
      labels:
        app: nginx-app
        tier: frontend
    spec:
      containers:
        - name: nginx-app
          image: nginx:alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "25m"
              memory: "32Mi"
            limits:
              cpu: "50m"
              memory: "64Mi"
